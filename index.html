<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grooming Poker</title>
    <style>
      :root {
        --bg: #f4f7fb;
        --card: #ffffff;
        --text: #1f2937;
        --accent: #0f766e;
        --accent-soft: #ccfbf1;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: radial-gradient(circle at top left, #dbeafe, var(--bg));
        color: var(--text);
      }
      .container {
        max-width: 960px;
        margin: 24px auto;
        padding: 16px;
      }
      .card {
        background: var(--card);
        border-radius: 14px;
        padding: 16px;
        margin-bottom: 16px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      }
      h1 { margin-top: 0; }
      .row { display: flex; gap: 8px; flex-wrap: wrap; }
      input {
        padding: 10px;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        font-size: 16px;
      }
      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 15px;
        cursor: pointer;
      }
      .primary { background: var(--accent); color: white; }
      .secondary { background: #e5e7eb; }
      .score {
        min-width: 56px;
        background: var(--accent-soft);
      }
      .score.active {
        background: var(--accent);
        color: white;
      }
      ul { margin: 0; padding-left: 20px; }
      .muted { color: #6b7280; }
      .error { color: #b91c1c; min-height: 24px; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h1>Grooming Poker</h1>
        <p class="muted">Puanlar: 1, 2, 3, 5, 8, 13, 21</p>
        <div class="row">
          <input id="nameInput" placeholder="İsmin" maxlength="30" />
          <button id="joinBtn" class="primary">Katıl</button>
          <button id="revealBtn" class="secondary">Oyları Göster</button>
          <button id="resetBtn" class="secondary">Yeni Tur</button>
        </div>
        <p id="error" class="error"></p>
      </div>

      <div class="card">
        <h2>Oyun Kartları</h2>
        <div id="scores" class="row"></div>
      </div>

      <div class="card">
        <h2>Katılımcılar</h2>
        <ul id="users"></ul>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();
      const nameInput = document.getElementById("nameInput");
      const joinBtn = document.getElementById("joinBtn");
      const revealBtn = document.getElementById("revealBtn");
      const resetBtn = document.getElementById("resetBtn");
      const scoresEl = document.getElementById("scores");
      const usersEl = document.getElementById("users");
      const errorEl = document.getElementById("error");

      let joined = false;
      let selectedScore = null;

      function setError(msg = "") {
        errorEl.textContent = msg;
      }

      function renderScores(scores) {
        scoresEl.innerHTML = "";
        for (const score of scores) {
          const btn = document.createElement("button");
          btn.className = `score${selectedScore === score ? " active" : ""}`;
          btn.textContent = String(score);
          btn.onclick = () => {
            if (!joined) {
              setError("Önce isminle katıl.");
              return;
            }
            selectedScore = score;
            socket.emit("vote:submit", score);
          };
          scoresEl.appendChild(btn);
        }
      }

      joinBtn.onclick = () => {
        const name = nameInput.value.trim();
        if (!name) {
          setError("İsim gir.");
          return;
        }
        socket.emit("user:join", name);
        joined = true;
        setError("");
      };

      revealBtn.onclick = () => socket.emit("vote:reveal");
      resetBtn.onclick = () => {
        selectedScore = null;
        socket.emit("vote:reset");
      };

      socket.on("error:message", setError);

      socket.on("state:update", (state) => {
        renderScores(state.allowedScores);
        usersEl.innerHTML = "";

        for (const user of state.users) {
          const li = document.createElement("li");
          const voteText = user.vote === null
            ? user.hasVoted ? "oy verdi" : "bekliyor"
            : `oy: ${user.vote}`;
          li.textContent = `${user.name} - ${voteText}`;
          usersEl.appendChild(li);
        }
      });
    </script>
  </body>
</html>
